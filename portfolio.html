<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Amber phosphor (default) */
    --fg: #ffb000;
    --fg-bright: #ffd166;
    --fg-dim: #a86f00;
    --fg-dimmer: #6b4500;
    --fg-err: #ff6a3d;
    --bg: #150900;
    --bg-darker: #0a0400;
  }

  /* Green phosphor theme */
  body.theme-green {
    --fg: #33ff66;
    --fg-bright: #a8ffbb;
    --fg-dim: #1a9933;
    --fg-dimmer: #0f5a1f;
    --fg-err: #ff6a3d;
    --bg: #001a08;
    --bg-darker: #000d04;
  }

  /* White/paperwhite phosphor */
  body.theme-white {
    --fg: #e8e8e8;
    --fg-bright: #ffffff;
    --fg-dim: #888888;
    --fg-dimmer: #555555;
    --fg-err: #ff6a3d;
    --bg: #0a0a0a;
    --bg-darker: #000000;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-darker);
    color: var(--fg);
    font-family: 'VT323', 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 22px;
    line-height: 1.25;
  }

  /* ═══════ CRT FRAME ═══════ */
  .crt {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at center, var(--bg) 0%, var(--bg-darker) 100%);
    overflow: hidden;
    padding: 2vmin 3vmin;
  }

  /* Scanlines overlay */
  .crt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(0, 0, 0, 0.22) 3px,
      rgba(0, 0, 0, 0.22) 4px
    );
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: multiply;
  }

  /* Vignette + subtle CRT curvature illusion */
  .crt::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0, 0, 0, 0.35) 85%,
        rgba(0, 0, 0, 0.7) 100%);
    pointer-events: none;
    z-index: 11;
    box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.6);
  }

  /* Full-screen flicker */
  .crt-flicker {
    position: absolute;
    inset: 0;
    background: var(--fg);
    opacity: 0;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 9;
    animation: flicker 8s infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0; }
    7.5% { opacity: 0.018; }
    15% { opacity: 0; }
    22% { opacity: 0.012; }
    30% { opacity: 0; }
    58% { opacity: 0.02; }
    66% { opacity: 0; }
  }

  /* Very subtle horizontal scroll (roll) every so often */
  @keyframes roll {
    0%, 97%, 100% { transform: translateY(0); }
    98% { transform: translateY(-2px); }
    99% { transform: translateY(2px); }
  }

  /* ═══════ TERMINAL ═══════ */
  #terminal {
    position: relative;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 1vmin 1.5vmin;
    color: var(--fg);
    text-shadow:
      0 0 2px rgba(255, 176, 0, 0.7),
      0 0 6px rgba(255, 120, 0, 0.35);
    animation: roll 40s infinite;
    z-index: 2;
    user-select: text;
    -webkit-user-select: text;
  }

  body.theme-green #terminal {
    text-shadow:
      0 0 2px rgba(51, 255, 102, 0.7),
      0 0 6px rgba(30, 200, 80, 0.35);
  }
  body.theme-white #terminal {
    text-shadow:
      0 0 2px rgba(232, 232, 232, 0.7),
      0 0 6px rgba(200, 200, 200, 0.35);
  }

  #terminal::-webkit-scrollbar { width: 10px; }
  #terminal::-webkit-scrollbar-track { background: transparent; }
  #terminal::-webkit-scrollbar-thumb {
    background: var(--fg-dimmer);
    border-radius: 0;
  }
  #terminal::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  /* Output lines */
  .line {
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.25em;
  }

  .line pre {
    font-family: inherit;
    font-size: inherit;
    line-height: 1.1;
    white-space: pre;
    overflow-x: auto;
  }

  /* Text tones */
  .dim { color: var(--fg-dim); text-shadow: 0 0 1px rgba(168, 111, 0, 0.5); }
  body.theme-green .dim { text-shadow: 0 0 1px rgba(26, 153, 51, 0.5); }
  body.theme-white .dim { text-shadow: 0 0 1px rgba(136, 136, 136, 0.5); }

  .bright { color: var(--fg-bright); }
  .err { color: var(--fg-err); text-shadow: 0 0 2px rgba(255, 106, 61, 0.6); }
  .ok { color: var(--fg-bright); }

  /* Prompt line */
  #prompt-line {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
  }
  #prompt-line.hidden { visibility: hidden; }
  .prompt-symbol { color: var(--fg); margin-right: 0.5ch; }
  .prompt-symbol::before { content: '$'; }

  /* Custom block cursor (mirror input) */
  #typed-pre, #typed-post { white-space: pre; }
  #cursor-char {
    display: inline-block;
    min-width: 0.6em;
    text-align: center;
    background: var(--fg);
    color: var(--bg-darker);
    text-shadow: none;
    animation: blink 1.05s steps(2, end) infinite;
  }
  body.no-blink #cursor-char { animation: none; background: var(--fg); }
  @keyframes blink {
    0%, 49% { background: var(--fg); color: var(--bg-darker); }
    50%, 100% { background: transparent; color: var(--fg); text-shadow: inherit; }
  }

  /* Hidden real input captures keystrokes */
  #input {
    position: fixed;
    top: -100px;
    left: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    border: 0;
    outline: none;
  }

  /* Typing (intro sim) span */
  .typing { color: var(--fg); }

  /* Banner box border styling */
  .banner {
    color: var(--fg);
    font-family: inherit;
    font-size: 0.95em;
    line-height: 1.0;
  }

  /* Don't allow selection on anything during boot */
  .booting { cursor: default; }

  /* Link styling in output */
  a {
    color: var(--fg-bright);
    text-decoration: underline;
    text-decoration-style: dotted;
  }
  a:hover { color: var(--fg); background: var(--fg-dimmer); }

  /* Section header inside output */
  .hdr {
    color: var(--fg-bright);
    display: inline;
  }

  /* Soft gap for spacing */
  .gap { height: 0.5em; }

  /* Mobile */
  @media (max-width: 600px) {
    html, body { font-size: 17px; }
    .crt { padding: 1vmin 2vmin; }
  }
</style>

const output = document.getElementById('output');

/* ── Helpers ── */
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function scrollBottom() {
  term.scrollTop = term.scrollHeight;
}

function appendLine(html = '', cls = '') {
  const el = document.createElement('div');
  el.className = 'line' + (cls ? ' ' + cls : '');
  el.innerHTML = html || '&nbsp;';
  output.appendChild(el);
  scrollBottom();
  return el;
}

function appendLines(arr) {
  arr.forEach(l => appendLine(l || ''));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

/* ── Typing simulation for boot ── */
async function typeInto(el, text, speed = 60, jitter = 40) {
  for (const ch of text) {
    el.textContent += ch;
    scrollBottom();
    await sleep(speed + Math.random() * jitter);
  }
}

  await sleep(220);

  appendLine('');

  // First (failed) login attempt

  await typeInto(document.getElementById('l1'), 'abhinav', 70, 45);
  await sleep(300);
  const p1 = appendLine('Password: <span id="p1"></span>');
  await sleep(250);
  await typeInto(document.getElementById('p1'), '••••••', 90, 40);
  await sleep(500);
  appendLine('<span class="err">Login incorrect</span>');
  await sleep(700);
  appendLine('');

  // Second (successful) login
  const l2 = appendLine('vt220 login: <span id="l2"></span>');
  await sleep(250);
  await typeInto(document.getElementById('l2'), 'abhinav', 65, 35);
  await sleep(250);
  const p2 = appendLine('Password: <span id="p2"></span>');
  await sleep(200);
  await typeInto(document.getElementById('p2'), '••••••••', 80, 30);
  await sleep(600);

  // MOTD
  appendLine('Last login: Tue Apr 21 18:02:06 PDT 2026 on tty01');
  appendLine('You have 1 failed login attempt since the last successful login.');
  await sleep(400);
  appendLine('');

  // Welcome banner
  const banner =
`<span class="bright">+----------------------------------------------------------+
|                                                          |
|   ABHINAV PARAMESHWARAN · AI ENGINEER                    |
|   Los Angeles, CA · Keck School of Medicine, USC         |
|                                                          |
|   3+ yrs · LLMs · RAG · LangGraph · Pinecone · AWS       |
|                                                          |
|   Type <span style="color: var(--fg)">help</span> to get started.                              |
|                                                          |
+----------------------------------------------------------+</span>`;
  appendLine(`<pre class="banner">${banner}</pre>`);
  appendLine('');

  // Hand off to user
  document.body.classList.remove('booting');
  waiting = true;
  promptLine.classList.remove('hidden');
  scrollBottom();
  focusInput();
}

/* ══════════════════════════════════════════════════════════════
   COMMAND EXECUTION
   ══════════════════════════════════════════════════════════════ */
async function runCommand(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  const entry = COMMANDS[cmd];
  if (!entry) {
    appendLine(`<span class="err">portfolio-sh: command not found: ${escapeHtml(cmd)}</span>`);
    appendLine(`<span class="dim">Try \`help\` for available commands.</span>`);
    appendLine('');
    return;
  }

  try {
    const result = await entry.run(args, trimmed);
    if (result === 'SILENT') return;
    if (Array.isArray(result)) appendLines(result);
    else if (typeof result === 'string') appendLine(result);
    appendLine('');
  } catch (err) {
    appendLine(`<span class="err">error: ${escapeHtml(err.message)}</span>`);
  }
}

function echoPrompt(cmd) {
  appendLine(`<span class="prompt-symbol"></span> ${escapeHtml(cmd)}`);
}

/* ══════════════════════════════════════════════════════════════
   INPUT HANDLING (mirror to visible cursor)
   ══════════════════════════════════════════════════════════════ */
function renderMirror() {
  const val = input.value;
  const pos = input.selectionStart ?? val.length;
  const pre = val.slice(0, pos);
  const atChar = val.slice(pos, pos + 1);
  const post = val.slice(pos + 1);
  typedPre.textContent = pre;
  // Cursor block shows the character at position, or a non-breaking space if at end
  cursorChar.innerHTML = atChar ? escapeHtml(atChar) : '&nbsp;';
  typedPost.textContent = post;
}

function focusInput() {
  input.focus({ preventScroll: true });
}

// Sync mirror on every input event
input.addEventListener('input', renderMirror);
input.addEventListener('keyup', renderMirror);
input.addEventListener('click', renderMirror);

input.addEventListener('keydown', async (e) => {
  if (!waiting) {
    e.preventDefault();
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = input.value;
    input.value = '';
    renderMirror();
    if (cmd.trim()) {
      history.unshift(cmd.trim());
      historyIdx = -1;
    }
    echoPrompt(cmd);
    await runCommand(cmd);
    scrollBottom();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length && historyIdx < history.length - 1) {
      historyIdx++;
      input.value = history[historyIdx];
      setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; renderMirror(); }, 0);
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      input.value = history[historyIdx];
    } else {
      historyIdx = -1;
      input.value = '';
    }
    setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; renderMirror(); }, 0);
  } else if (e.key === 'Tab') {
    e.preventDefault();
    tabComplete();
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  } else if (e.key === 'c' && e.ctrlKey) {
    // Ctrl+C: abort line
    e.preventDefault();
    echoPrompt(input.value + '^C');
    input.value = '';
    renderMirror();
  }
});

/* Tab completion */
function tabComplete() {
  const val = input.value;
  const parts = val.split(/\s+/);
  if (parts.length > 1) {
    // Argument completion for projects, cat, open, man
    const cmd = parts[0].toLowerCase();
    const partial = parts[parts.length - 1].toLowerCase();
    let candidates = [];
    if (cmd === 'projects') {
      candidates = ['raydiant', 'trip-concierge', 'wafllm', 'copd', 'v-attendance', 'gaia'];
    } else if (cmd === 'cat') {
      candidates = ['about.md', 'contact.md', 'education.md', 'experience.md', 'resume.md', 'skills.md'];
    } else if (cmd === 'open') {
      candidates = ['github', 'linkedin', 'email'];
    } else if (cmd === 'theme') {
      candidates = ['amber', 'green', 'white'];
    } else if (cmd === 'man') {
      candidates = Object.keys(COMMANDS).filter(c => !COMMANDS[c].hidden);
    }
    const matches = candidates.filter(c => c.startsWith(partial));
    if (matches.length === 1) {
      parts[parts.length - 1] = matches[0];
      input.value = parts.join(' ');
      setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; renderMirror(); }, 0);
    } else if (matches.length > 1) {
      appendLine('<span class="dim">' + matches.join('  ') + '</span>');
      scrollBottom();
    }
    return;
  }

  // Command completion
  const partial = (parts[0] || '').toLowerCase();
  if (!partial) return;
  const all = Object.keys(COMMANDS).filter(c => !COMMANDS[c].hidden);
  const matches = all.filter(c => c.startsWith(partial));
  if (matches.length === 1) {
    input.value = matches[0] + ' ';
    setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; renderMirror(); }, 0);
  } else if (matches.length > 1) {
    appendLine('<span class="dim">' + matches.join('  ') + '</span>');
    scrollBottom();
  }
}

/* Focus input whenever user clicks anywhere */
document.addEventListener('click', (e) => {
  // Don't steal focus if user is selecting text or clicking a real link
  if (window.getSelection().toString()) return;
  if (e.target.tagName === 'A') return;
  focusInput();
});

document.addEventListener('keydown', (e) => {
  // If focus lost, restore it on any key
  if (document.activeElement !== input) focusInput();
});
